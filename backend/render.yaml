services:
  - type: web
    name: literature-analysis-backend
    env: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
